name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run lint
        run: deno task lint

      - name: Run type checks
        run: deno task check

      - name: Run tests and coverage
        run: deno task coverage

      - name: Export LCOV coverage
        run: deno task coverage:lcov

      - name: Export HTML coverage
        run: deno task coverage:html

      - name: Upload LCOV coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: .coverage/lcov.info
          if-no-files-found: error

      - name: Upload HTML coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: .coverage/html
          if-no-files-found: error
