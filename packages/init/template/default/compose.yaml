services:
  db:
    image: postgres:17
    container_name: __CURIO_PROJECT_SLUG__-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
    retries: 10
    volumes:
      - __CURIO_PROJECT_SLUG__-postgres-data:/var/lib/postgresql/data

volumes:
  __CURIO_PROJECT_SLUG__-postgres-data:
